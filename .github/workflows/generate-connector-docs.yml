name: Generate Connector Documentation

on:
  workflow_dispatch:
    inputs:
      github_repo:
        description: Repository name under ballerina-platform
        required: true
        type: string
      category:
        description: Documentation catalog category
        required: true
        type: choice
        options:
          - ai-ml
          - built-in
          - cloud-infrastructure
          - communication
          - crm-sales
          - database
          - developer-tools
          - ecommerce
          - erp-business
          - finance-accounting
          - healthcare
          - hrms
          - marketing-social
          - messaging
          - productivity-collaboration
          - security-identity
          - storage-file

jobs:
  generate:
    name: Generate ${{ inputs.github_repo }} documentation
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out generator
        uses: actions/checkout@v4
        with:
          path: generator

      - name: Check out docs-integrator
        uses: actions/checkout@v4
        with:
          repository: wso2/docs-integrator
          ref: main
          token: ${{ secrets.BALLERINA_BOT_TOKEN }}
          path: docs-integrator
          sparse-checkout: |
            en/sidebars.ts
            en/docs/connectors/catalog/index.mdx
            en/docs/connectors/catalog/${{ inputs.category }}
          sparse-checkout-cone-mode: false

      - name: Set up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.3
        with:
          version: 2201.13.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate documentation
        working-directory: generator/connector-doc-generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONNECTOR_REPOSITORY: ${{ inputs.github_repo }}
          CATEGORY: ${{ inputs.category }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret is required."
            exit 1
          fi
          bal run -- \
            -CgithubRepo="$CONNECTOR_REPOSITORY" \
            -Ccategory="$CATEGORY" \
            -CdocsRepoRoot="$GITHUB_WORKSPACE/docs-integrator"

      - name: Create docs-integrator pull request
        id: pull_request
        working-directory: docs-integrator
        env:
          GH_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
          CONNECTOR_REPOSITORY: ${{ inputs.github_repo }}
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes were produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          branch="connector-docs/${CONNECTOR_REPOSITORY}-${GITHUB_RUN_ID}"
          git config user.name "ballerina-bot"
          git config user.email "ballerina-bot@ballerina.org"
          git checkout -b "$branch"
          git add en/
          git commit -m "docs: add ${CONNECTOR_REPOSITORY} connector documentation"
          git push origin "$branch"

          pr_url=$(gh pr create \
            --repo wso2/docs-integrator \
            --base main \
            --head "$branch" \
            --title "docs: add ${CONNECTOR_REPOSITORY} connector documentation" \
            --body "Generated by the connector documentation workflow.")
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Created docs-integrator PR: $pr_url" >> "$GITHUB_STEP_SUMMARY"
